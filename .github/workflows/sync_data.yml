name: Daily Data Sync

on:
  schedule:
    - cron: '0 14 * * *'  # 6:00 AM Vancouver time (UTC-8)
  workflow_dispatch:       # Also allows manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas requests openpyxl pyarrow pypdf beautifulsoup4 lxml

      - name: Sync market data (MLS transactions)
        env:
          GDRIVE_API_KEY: ${{ secrets.GDRIVE_API_KEY }}
        run: python3 sync_data.py

      - name: Sync knowledge base (Drive docs + BCFSA website)
        env:
          GDRIVE_API_KEY: ${{ secrets.GDRIVE_API_KEY }}
        run: python3 sync_docs.py

      - name: Commit and push if anything changed
        run: |
          git config user.name "SIRC Data Bot"
          git config user.email "actions@github.com"
          git add data/combined_data.parquet data/docs/knowledge_base.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "Auto-sync: refresh data and knowledge base $(date +'%Y-%m-%d')"
            git push
          fi
